{% extends 'base.html' %}
{% block content %}
<h2>Schedule a New Service</h2>

<form method="POST">
    <input class="form-control mb-2" name="description" placeholder="Service description" required>
    <input class="form-control mb-2" name="date" type="date" required>
    <input class="form-control mb-2" name="time" type="time" required>

    <div class="mb-3">
        <label for="address" class="form-label">Endereço</label>
        <input type="text" id="address" name="address" class="form-control" required>
    </div>

    <button class="btn btn-success">Schedule</button>
</form>

<a href="{{ url_for('main.dashboard_client') }}" class="btn btn-secondary mt-3">Back</a>

<!-- Google Maps Places API -->
<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA_UgIgFy5bB54bri3nNL_HEbWaHBCCKlg&libraries=places&callback=initAutocomplete"
  async defer
></script>
<script>
  function initAutocomplete() {
    const input = document.getElementById("address");
    new google.maps.places.Autocomplete(input);
  }
</script>
{% endblock %}
